<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Estresse</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a0000, #330000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      transition: 0.3s;
    }

    .container {
      text-align: center;
      background: #2b0000;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    .contador {
      font-size: 70px;
      margin: 20px 0;
      font-weight: bold;
      color: #ff3b3b;
    }

    .alerta {
      color: yellow;
      font-weight: bold;
      margin-top: 10px;
    }

    .mensagem {
      margin-top: 15px;
      font-style: italic;
      color: #f1c40f;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .add {
      background-color: #c0392b;
      color: white;
    }

    .reset {
      background-color: #27ae60;
      color: white;
    }

    .nuclear {
      animation: piscar 0.5s infinite;
      background: red !important;
    }

    @keyframes piscar {
      0% { background: #330000; }
      50% { background: red; }
      100% { background: #330000; }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Monitor de Estresse</h2>

  <div class="contador" id="contador">0</div>
  <p>dias com estresse com a Priscilla 💀</p>

  <div id="alertaTexto" class="alerta"></div>
  <div id="mensagemTexto" class="mensagem"></div>

  <button class="add" onclick="incrementar()">🔥 Me estressei</button>
  <button class="reset" onclick="resetar()">😌 Dia de paz</button>
</div>

<script>
  let contador = localStorage.getItem("estresse") || 0;

  const contadorEl = document.getElementById("contador");
  const alertaEl = document.getElementById("alertaTexto");
  const msgEl = document.getElementById("mensagemTexto");

  const mensagens = {
    leve: [
      "Hmm... começou cedo hoje 😅",
      "Calma, respira...",
      "Só ignora e segue o jogo",
      "Você está por um fio..."
    ],
    moderado: [
      "Situação ficando feia...",
      "Respira antes de responder...",
      "Isso vai dar ruim 👀",
      "Controle emocional tá testado hoje"
    ],
    alto: [
      "Perigo real ⚠️",
      "Você já perdeu a paciência faz tempo",
      "Modo sobrevivência ativado",
      "Aqui já virou guerra psicológica"
    ],
    nuclear: [
      "🚨 ALERTA NUCLEAR 🚨",
      "Abandone o local imediatamente",
      "Sem condições de continuar",
      "Nível crítico atingido ☢️"
    ]
  };

  atualizarTela();

  function incrementar() {
    contador++;
    salvar();
  }

  function resetar() {
    if (confirm("Sério? Não rolou nenhum estresse hoje? 🙏")) {
      contador = 0;
      salvar();
    }
  }

  function salvar() {
    localStorage.setItem("estresse", contador);
    atualizarTela();
  }

  function random(lista) {
    return lista[Math.floor(Math.random() * lista.length)];
  }

  function atualizarTela() {
    contadorEl.innerText = contador;

    let nivel = "";
    let mensagem = "";

    // 🔁 muda nível a cada 5 dias
    if (contador >= 10) {
      nivel = "nuclear";
      document.body.classList.add("nuclear");
    } else if (contador >= 5) {
      nivel = "alto";
      document.body.classList.remove("nuclear");
    } else if (contador >= 2) {
      nivel = "moderado";
      document.body.classList.remove("nuclear");
    } else if (contador >= 1) {
      nivel = "leve";
      document.body.classList.remove("nuclear");
    } else {
      nivel = "paz";
      document.body.classList.remove("nuclear");
    }

    // ALERTA PRINCIPAL
    if (nivel === "nuclear") {
      alertaEl.innerText = "🚨 ALERTA NUCLEAR ATIVADO 🚨";
      mensagem = random(mensagens.nuclear);
    } else if (nivel === "alto") {
      alertaEl.innerText = "⚠️ Situação crítica";
      mensagem = random(mensagens.alto);
    } else if (nivel === "moderado") {
      alertaEl.innerText = "😐 Atenção";
      mensagem = random(mensagens.moderado);
    } else if (nivel === "leve") {
      alertaEl.innerText = "😶 Começou...";
      mensagem = random(mensagens.leve);
    } else {
      alertaEl.innerText = "🕊️ Paz restaurada";
      mensagem = "Hoje foi um bom dia... raro.";
    }

    msgEl.innerText = mensagem;
  }
</script>

</body>
</html>
