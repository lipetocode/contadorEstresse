<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor de Estresse</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a0000, #330000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      transition: 0.3s;
    }

    .container {
      text-align: center;
      background: #2b0000;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    .contador {
      font-size: 70px;
      margin: 20px 0;
      font-weight: bold;
      color: #ff3b3b;
    }

    .alerta {
      color: yellow;
      font-weight: bold;
      margin-top: 10px;
    }

    .mensagem {
      margin-top: 15px;
      font-style: italic;
      color: #f1c40f;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .add {
      background-color: #c0392b;
      color: white;
    }

    .reset {
      background-color: #27ae60;
      color: white;
    }

    .nuclear {
      animation: piscar 0.5s infinite;
      background: red !important;
    }

    @keyframes piscar {
      0% { background: #330000; }
      50% { background: red; }
      100% { background: #330000; }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Monitor de Estresse</h2>

  <div class="contador" id="contador">0</div>
  <p>dias com estresse com o Cancer Center 💀</p>

  <div id="alertaTexto" class="alerta"></div>
  <div id="mensagemTexto" class="mensagem"></div>

  <button class="add" onclick="incrementar()">🔥 Me estressei</button>
  <button class="reset" onclick="resetar()">😌 Dia de paz</button>
</div>

<script>

  let contador = parseInt(localStorage.getItem("estresse")) || 0;

  const contadorEl = document.getElementById("contador");
  const alertaEl = document.getElementById("alertaTexto");
  const msgEl = document.getElementById("mensagemTexto");

  const mensagens = {

  leve: [

    "Hmm... começou cedo hoje 😅",
    "Só ignora e segue o jogo.",
    "Você ainda tem esperança.",
    "Calma... talvez amanhã melhore.",
    "Primeiros danos emocionais detectados."
  ],

  moderado: [

    "Respira antes de responder...",
    "Controle emocional em estado instável.",
    "Discussão detectada em órbita próxima.",
    "Seu psicológico pediu férias.",
    "O silêncio já está ficando estranho.",
    "Nível de paciência abaixo do recomendado."
  ],

  alto: [

    "⚠️ Situação crítica.",
    "A sanidade já não responde aos comandos.",
    "Modo sobrevivência ativado.",
    "Toda conversa agora parece uma armadilha.",
    "A diplomacia falhou completamente.",
    "Seu cérebro entrou em modo defesa.",
    "Já existem danos psicológicos permanentes."
  ],

  nuclear: [

    "🚨 ALERTA NUCLEAR 🚨",
    "Abandone o local imediatamente.",
    "Não há mais negociações possíveis.",
    "A OTAN foi acionada.",
    "Estado emocional entrou em colapso.",
    "O sistema detectou níveis ilegais de estresse.",
    "Seu último neurônio está lutando bravamente.",
    "O psicológico foi de arrasta pra cima.",
    "Toda esperança foi oficialmente perdida.",
    "☢️ FIM DA LINHA ☢️"
  ]

};
  verificarDias();
  atualizarTela();

  // 🔥 VERIFICA QUANTOS DIAS PASSARAM
  function verificarDias() {

    const hoje = new Date().toDateString();
    const ultimaData = localStorage.getItem("ultimaData");

    // primeira execução
    if (!ultimaData) {
      localStorage.setItem("ultimaData", hoje);
      return;
    }

    const dataAntiga = new Date(ultimaData);
    const dataAtual = new Date(hoje);

    const diferenca = Math.floor(
      (dataAtual - dataAntiga) / (1000 * 60 * 60 * 24)
    );

    // adiciona automaticamente
    if (diferenca > 0) {
      contador += diferenca;
      salvar();
    }

    localStorage.setItem("ultimaData", hoje);
  }

  // 🔥 botão manual
  function incrementar() {
    contador++;
    salvar();
  }

  // 😌 reset
  function resetar() {
    if (confirm("Dia de paz confirmado? 🙏")) {
      contador = 0;
      salvar();
    }
  }

  function salvar() {
    localStorage.setItem("estresse", contador);
    atualizarTela();
  }

  function random(lista) {
    return lista[Math.floor(Math.random() * lista.length)];
  }

  function atualizarTela() {

    contadorEl.innerText = contador;

    let nivel = "";
    let mensagem = "";

    if (contador >= 30) {

      nivel = "nuclear";
      document.body.classList.add("nuclear");

    } else if (contador >= 20) {

      nivel = "alto";
      document.body.classList.remove("nuclear");

    } else if (contador >= 10) {

      nivel = "moderado";
      document.body.classList.remove("nuclear");

    } else if (contador >= 5) {

      nivel = "leve";
      document.body.classList.remove("nuclear");

    } else {

      nivel = "paz";
      document.body.classList.remove("nuclear");
    }

    // ALERTAS
    switch(nivel) {

      case "leve":
        alertaEl.innerText = "😐 Primeiros sinais";
        mensagem = random(mensagens.leve);
      break;

      case "moderado":
        alertaEl.innerText = "⚠️ Atenção";
        mensagem = random(mensagens.moderado);
      break;

      case "alto":
        alertaEl.innerText = "🔥 Situação crítica";
        mensagem = random(mensagens.alto);
      break;

      case "nuclear":
        alertaEl.innerText = "🚨 ALERTA NUCLEAR ATIVADO 🚨";
        mensagem = random(mensagens.nuclear);
      break;

      default:
        alertaEl.innerText = "🕊️ Paz restaurada";
        mensagem = "Milagre aconteceu hoje.";
    }

    msgEl.innerText = mensagem;
  }

</script>
</body>
</html>
